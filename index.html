<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --purple: #0066FF; --purple-lt: #E0EEFF; --purple-dk: #0047CC;
    --teal: #1D9E75;   --teal-lt: #E1F5EE;   --teal-dk: #0F6E56;
    --amber: #BA7517;  --amber-lt: #FAEEDA;
    --red: #A32D2D;    --red-lt: #FCEBEB;
    --blue: #0047CC;   --blue-lt: #E0EEFF;
    --gray: #5F5E5A;   --gray-lt: #F1EFE8;   --gray-dk: #2C2C2A;
    --bg: #F5F7FA; --surface: #FFFFFF; --border: rgba(0,0,0,0.09);
    --text: #0D1117; --text-2: #6B6A66; --text-3: #9E9D99;
    --radius: 10px; --radius-lg: 14px;
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; }

  /* ── LAYOUT ── */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 200px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .content { flex: 1; overflow-y: auto; padding: 20px; }

  /* ── SIDEBAR ── */
  .sb-logo { padding: 16px 16px 14px; font-size: 15px; font-weight: 600; border-bottom: 1px solid var(--border); letter-spacing: -0.3px; }
  .sb-logo span { color: var(--purple); }
  .sb-sec { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); padding: 10px 16px 4px; font-weight: 500; }
  .nav { display: flex; align-items: center; gap: 9px; padding: 8px 16px; font-size: 12.5px; cursor: pointer; color: var(--text-2); border-left: 2px solid transparent; transition: all .15s; font-weight: 400; }
  .nav:hover { background: var(--gray-lt); color: var(--text); }
  .nav.active { color: var(--purple); border-left-color: var(--purple); background: var(--purple-lt); font-weight: 500; }
  .nav-ic { font-size: 14px; width: 16px; text-align: center; }
  .agent-btn { display: flex; align-items: center; gap: 8px; padding: 6px 16px; cursor: pointer; font-size: 12px; color: var(--text-2); font-family: var(--font); background: none; border: none; width: 100%; text-align: left; transition: background .15s; }
  .agent-btn:hover { background: var(--gray-lt); }
  .agent-btn.sel { color: var(--text); font-weight: 500; }
  .agent-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── TOPBAR ── */
  .tb-title { font-size: 15px; font-weight: 600; flex: 1; letter-spacing: -0.3px; }
  .tb-search { padding: 6px 11px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); font-size: 12px; color: var(--text); width: 180px; font-family: var(--font); outline: none; transition: border-color .15s; }
  .tb-search:focus { border-color: var(--purple); }
  .tb-select { padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); font-size: 12px; color: var(--text); font-family: var(--font); cursor: pointer; outline: none; }
  .btn { padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; font-size: 12px; cursor: pointer; color: var(--text); font-family: var(--font); font-weight: 500; transition: all .15s; }
  .btn:hover { background: var(--gray-lt); }
  .btn-p { background: var(--purple); color: #fff; border-color: var(--purple); }
  .btn-p:hover { background: var(--purple-dk); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-danger { background: var(--red-lt); color: var(--red); border-color: var(--red-lt); }
  .btn-danger:hover { background: #f7c1c1; }

  /* ── STAT CARDS ── */
  .stats { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; margin-bottom: 18px; }
  .sc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; }
  .sc-l { font-size: 10.5px; color: var(--text-2); margin-bottom: 4px; font-weight: 500; }
  .sc-v { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .sc-s { font-size: 10px; color: var(--text-3); margin-top: 2px; }

  /* ── BADGES ── */
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 500; display: inline-block; }
  .b-won  { background: var(--teal-lt);   color: var(--teal-dk); }
  .b-neg  { background: var(--blue-lt); color: var(--blue); }
  .b-prop { background: var(--amber-lt);  color: var(--amber); }
  .b-disc { background: #E0EEFF;   color: #0047CC; }
  .b-pros { background: var(--gray-lt);   color: var(--gray); }
  .b-verb { background: var(--red-lt);    color: var(--red); }
  .b-lost { background: #f7c1c1;          color: #501313; }

  /* ── CARDS ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; }
  .card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-title { font-size: 12.5px; font-weight: 600; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* ── PIPELINE ── */
  .pipeline { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
  .pcol { min-width: 160px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 10px; flex-shrink: 0; }
  .pcol-h { font-size: 11px; font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .pcnt { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 1px 7px; font-size: 10px; font-weight: 400; }
  .deal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px; margin-bottom: 6px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .deal-card:hover { border-color: var(--purple); box-shadow: 0 2px 8px rgba(127,119,221,.12); }
  .deal-n { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .deal-v { font-size: 11px; color: var(--text-2); }
  .deal-c { font-size: 10px; color: var(--text-3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ag-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }

  /* ── TABLE ── */
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { text-align: left; font-size: 10.5px; color: var(--text-2); font-weight: 600; padding: 6px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .tbl td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  .tbl tr:hover td { background: var(--bg); }
  .tbl tr:last-child td { border-bottom: none; }
  .av { width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; }
  .av-d { background: var(--blue-lt); color: var(--blue); }
  .av-m { background: var(--teal-lt);   color: var(--teal-dk); }

  /* ── TASKS ── */
  .task-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .task-row:last-child { border: none; }
  .chk { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all .15s; }
  .chk.done { background: var(--teal); border-color: var(--teal); color: #fff; }
  .task-txt { flex: 1; font-size: 12px; }
  .task-txt.done { text-decoration: line-through; color: var(--text-3); }
  .prio { font-size: 9px; padding: 2px 6px; border-radius: 999px; font-weight: 600; }
  .p-alta { background: var(--red-lt); color: var(--red); }
  .p-media { background: var(--amber-lt); color: var(--amber); }
  .p-baja { background: var(--teal-lt); color: var(--teal-dk); }

  /* ── ACTIVITIES ── */
  .act-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .act-item:last-child { border: none; }
  .act-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .act-body { flex: 1; }
  .act-title { font-size: 12px; font-weight: 500; }
  .act-sub { font-size: 11px; color: var(--text-2); margin-top: 2px; }
  .act-time { font-size: 10px; color: var(--text-3); white-space: nowrap; }

  /* ── KPI ROWS ── */
  .kpi-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .kpi-row:last-child { border: none; }
  .prog-bar { height: 4px; background: var(--bg); border-radius: 999px; overflow: hidden; flex: 1; margin: 0 10px; }
  .prog-fill { height: 100%; border-radius: 999px; }

  /* ── MODAL ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 22px; width: 480px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
  .modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .modal-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .close-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-3); line-height: 1; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
  .field input, .field select, .field textarea { width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text); font-family: var(--font); background: var(--bg); outline: none; transition: border-color .15s; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--purple); background: var(--surface); }
  .field textarea { resize: vertical; min-height: 70px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--gray-dk); color: #fff; padding: 10px 16px; border-radius: var(--radius); font-size: 12px; font-weight: 500; opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* ── LOADING ── */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-3); gap: 8px; font-size: 12px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 40px; color: var(--text-3); font-size: 12px; }

  /* ── DETAIL PANEL ── */
  .detail-modal .modal { width: 580px; }
  .detail-section { margin-bottom: 16px; }
  .detail-label { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .detail-val { font-size: 13px; color: var(--text); }

  /* ── NOTAS ── */
  .nota-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .nota-item:last-child { border: none; }
  .nota-av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .nota-body { flex: 1; }
  .nota-txt { font-size: 12.5px; color: var(--text); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .nota-meta { font-size: 10px; color: var(--text-3); margin-top: 3px; }
  .nota-input-wrap { display: flex; gap: 8px; margin-top: 10px; align-items: flex-end; }
  .nota-input { flex: 1; padding: 8px 11px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12.5px; color: var(--text); font-family: var(--font); background: var(--bg); outline: none; resize: none; min-height: 60px; max-height: 120px; transition: border-color .15s; }
  .nota-input:focus { border-color: var(--purple); background: var(--surface); }
  .nota-section { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
  .nota-section-hdr { font-size: 11px; font-weight: 600; color: var(--text-2); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .nota-empty { font-size: 12px; color: var(--text-3); padding: 16px 0; text-align: center; }
  .nota-delete { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 14px; padding: 0 4px; line-height: 1; transition: color .15s; flex-shrink: 0; }
  .nota-delete:hover { color: var(--red); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── MÓVIL ── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .app { flex-direction: column; }
    .topbar { flex-wrap: wrap; gap: 8px; padding: 10px 14px; }
    .tb-title { font-size: 14px; order: 1; flex: 1; }
    .tb-search { width: 100%; order: 4; }
    .tb-select { display: none; }
    #btn-resumen { order: 3; }
    .content { padding: 12px; padding-bottom: 70px; }
    .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stats .sc:last-child { grid-column: span 2; }
    .two-col { grid-template-columns: 1fr; }
    .pipeline { gap: 8px; }
    .pcol { min-width: 140px; }
    .modal { width: 95vw !important; padding: 16px; margin: 0 10px; max-height: 90vh; }
    .field-row { grid-template-columns: 1fr; }
    .tbl th:nth-child(4), .tbl td:nth-child(4),
    .tbl th:nth-child(5), .tbl td:nth-child(5),
    .tbl th:nth-child(8), .tbl td:nth-child(8) { display: none; }
    /* Nav móvil abajo */
    .mobile-nav { display: flex !important; }
  }
  .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); z-index: 50; }
  .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px; font-size: 9px; color: var(--text-3); cursor: pointer; gap: 3px; }
  .mobile-nav-item.active { color: var(--purple); }
  .mobile-nav-item span:first-child { font-size: 18px; }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">Corporate<span>CRM</span></div>
    <div class="sb-sec">Vistas</div>
    <div class="nav active" onclick="go('dashboard',this)"><span class="nav-ic">▦</span> Dashboard</div>
    <div class="nav" onclick="go('pipeline',this)"><span class="nav-ic">◈</span> Pipeline</div>
    <div class="nav" onclick="go('contacts',this)"><span class="nav-ic">◉</span> Contactos</div>
    <div class="nav" onclick="go('tasks',this)"><span class="nav-ic">◻</span> Tareas</div>
    <div class="nav" onclick="go('activities',this)"><span class="nav-ic">◎</span> Actividades</div>
    <div class="nav" onclick="go('analytics',this)"><span class="nav-ic">▲</span> Analytics</div>
    <div class="sb-sec">Agente</div>
    <button class="agent-btn sel" onclick="setAgent('all',this)"><span class="agent-dot" style="background:#888780"></span>Todos</button>
    <button class="agent-btn" onclick="setAgent('diego',this)"><span class="agent-dot" style="background:#0066FF"></span>Diego V.</button>
    <button class="agent-btn" onclick="setAgent('mauricio',this)"><span class="agent-dot" style="background:#1D9E75"></span>Mauricio B.</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tb-title">Dashboard</div>
      <input class="tb-search" id="search" placeholder="Buscar..." oninput="render()">
      <select class="tb-select" id="stage-filter" onchange="render()">
        <option value="">Todas las etapas</option>
        <option>Prospecting</option><option>Discovery</option><option>Proposal</option>
        <option>Negotiation</option><option>Verbal Commit</option><option>WON</option><option>LOST</option>
      </select>
      <button class="btn btn-p btn-sm" onclick="openNewDeal()">+ Nuevo deal</button>
      <button class="btn btn-sm" onclick="loadData()">↻ Sync</button>
      <button class="btn btn-sm" id="btn-resumen" onclick="generarResumen()" style="background:#0D1117;color:#fff;border-color:#0D1117">✦ Resumen</button>
      <button class="btn btn-sm" onclick="exportarExcel()" style="background:#1D6F42;color:#fff;border-color:#1D6F42">⬇ Excel</button>
    </div>
    <div class="content" id="content"><div class="loading"><div class="spinner"></div>Cargando datos...</div></div>
  </div>
</div>

<!-- MODAL NUEVO/EDITAR DEAL -->
<div class="modal-bg" id="deal-modal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title">Nuevo deal</div>
      <button class="close-btn" onclick="closeModal('deal-modal')">×</button>
    </div>
    <div class="field-row">
      <div class="field"><label>Empresa</label><input id="f-empresa" placeholder="Nombre de la empresa"></div>
      <div class="field"><label>Contacto</label><input id="f-contacto" placeholder="Nombre del contacto"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Industria</label><input id="f-industria" placeholder="Ej. Alimentos, Moda..."></div>
      <div class="field"><label>Servicio</label>
        <select id="f-servicio">
          <option value="">Seleccionar...</option>
          <option>Envia</option>
          <option>FTL</option>
          <option>LTL</option>
          <option>Fulfillment</option>
          <option>Ecart Pay</option>
          <option>Para Paquetes</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Stage</label>
        <select id="f-stage">
          <option>Prospecting</option><option>Discovery</option><option>Proposal</option>
          <option>Negotiation</option><option>Verbal Commit</option><option>WON</option><option>LOST</option>
        </select>
      </div>
      <div class="field"><label>Agente</label>
        <select id="f-agente"></select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Valor ($)</label><input id="f-valor" type="number" placeholder="0"></div>
      <div class="field"><label>Probabilidad (%)</label><input id="f-prob" type="number" min="0" max="100" placeholder="0"></div>
    </div>
    <div class="field"><label>Siguiente paso</label><input id="f-siguiente" placeholder="¿Qué sigue?"></div>
    <div class="field-row">
      <div class="field"><label>Primer contacto</label><input id="f-fecha1" type="date"></div>
      <div class="field"><label>Cierre estimado</label><input id="f-fecha2" type="date"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('deal-modal')">Cancelar</button>
      <button class="btn btn-p" onclick="saveDeal()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVA TAREA -->
<div class="modal-bg" id="task-modal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Nueva tarea</div>
      <button class="close-btn" onclick="closeModal('task-modal')">×</button>
    </div>
    <div class="field"><label>Título</label><input id="t-titulo" placeholder="Describe la tarea"></div>
    <div class="field-row">
      <div class="field"><label>Agente</label><select id="t-agente"></select></div>
      <div class="field"><label>Prioridad</label>
        <select id="t-prio"><option>Alta</option><option selected>Media</option><option>Baja</option></select>
      </div>
    </div>
    <div class="field"><label>Fecha límite</label><input id="t-fecha" type="date"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('task-modal')">Cancelar</button>
      <button class="btn btn-p" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVA ACTIVIDAD -->
<div class="modal-bg" id="act-modal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Registrar actividad</div>
      <button class="close-btn" onclick="closeModal('act-modal')">×</button>
    </div>
    <div class="field-row">
      <div class="field"><label>Tipo</label>
        <select id="a-tipo"><option>Llamada</option><option>Email</option><option>Reunion</option><option>WhatsApp</option><option>Propuesta</option><option>Otro</option></select>
      </div>
      <div class="field"><label>Agente</label><select id="a-agente"></select></div>
    </div>

<script>
const SUPABASE_URL = 'https://fupzkubjmronlutzdtuw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1cHprdWJqbXJvbmx1dHpkdHV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNTIyNDcsImV4cCI6MjA5MTYyODI0N30.E7jCfH40Uubl8uhoQGCuZHa2h5xK4JSTssbXFecdxEo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STAGES = ['Prospecting','Discovery','Proposal','Negotiation','Verbal Commit','WON','LOST'];
const SLABELS = {Prospecting:'Prospecto',Discovery:'Discovery',Proposal:'Propuesta',Negotiation:'Negociación','Verbal Commit':'Verbal Commit',WON:'Cerrado',LOST:'Perdido'};
const SCOLORS = {Prospecting:'#888780',Discovery:'#185FA5',Proposal:'#BA7517',Negotiation:'#534AB7','Verbal Commit':'#A32D2D',WON:'#1D9E75',LOST:'#888780'};
const SBADGE  = {Prospecting:'b-pros',Discovery:'b-disc',Proposal:'b-prop',Negotiation:'b-neg','Verbal Commit':'b-verb',WON:'b-won',LOST:'b-lost'};

let DB = { deals:[], agentes:[], tareas:[], actividades:[], notas:[], facturacion:[], stageHistory:[] };

function fmt(n){ if(!n||n==0)return'—'; if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M'; if(n>=1000)return'$'+(n/1000).toFixed(0)+'K'; return'$'+n.toLocaleString(); }
function fmtDate(d){ if(!d)return'—'; return new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short'}); }
function fmtDateTime(d){ if(!d)return'—'; const dt=new Date(d); return dt.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})+' '+dt.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}); }
function toast(msg,ok=true){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; t.style.background=ok?'#2C2C2A':'#A32D2D'; setTimeout(()=>t.className='toast',2500); }

// Días en el stage actual — umbral por etapa
const STAGE_LIMITS = { Prospecting:14, Discovery:14, Proposal:10, Negotiation:10, 'Verbal Commit':7, WON:999, LOST:999 };
function diasEnStage(d){
  const desde = d.stage_since || d.created_at;
  if(!desde) return null;
  return Math.floor((new Date() - new Date(desde)) / (1000*60*60*24));
}
function stageDaysLabel(d){
  if(['WON','LOST'].includes(d.stage)) return '';
  const dias = diasEnStage(d);
  if(dias===null) return '';
  const limite = STAGE_LIMITS[d.stage] || 14;
  const isRed = dias >= limite;
  const color = isRed ? '#A32D2D' : '#9E9D99';
  const bg = isRed ? '#FCEBEB' : '#F1EFE8';
  const label = dias === 0 ? 'Hoy' : dias === 1 ? '1 día' : `${dias} días`;
  return `<span style="font-size:9px;font-weight:600;padding:2px 6px;border-radius:999px;background:${bg};color:${color};margin-top:4px;display:inline-block">⏱ ${label}</span>`;
}

async function loadData(){
  try {
    const [d,a,t,ac,n,f,sh] = await Promise.all([
      sb.from('deals').select('*, empresas(*), agentes(*)').order('created_at',{ascending:false}),
      sb.from('agentes').select('*'),
      sb.from('tareas').select('*, agentes(*)').order('fecha_vencimiento'),
      sb.from('actividades').select('*, agentes(*), deals(*, empresas(*))').order('fecha',{ascending:false}).limit(50),
      sb.from('notas').select('*, agentes(*)').order('created_at',{ascending:false}),
      sb.from('facturacion').select('*, deals(*, empresas(*)), agentes(*)').order('mes',{ascending:false}),
      sb.from('stage_history').select('*, agentes(*)').order('created_at',{ascending:false}),
    ]);
    DB.deals        = d.data  || [];
    DB.agentes      = a.data  || [];
    DB.tareas       = t.data  || [];
    DB.actividades  = ac.data || [];
    DB.notas        = n.data  || [];
    DB.facturacion  = f.data  || [];
    DB.stageHistory = sh.data || [];
    populateSelects();
    render();
  } catch(e){ document.getElementById('content').innerHTML=`<div class="empty">Error cargando datos: ${e.message}</div>`; }
}

function populateSelects(){
  ['f-agente','t-agente','a-agente','fact-agente'].forEach(id=>{
    const el=document.getElementById(id); if(!el)return;
    el.innerHTML=DB.agentes.map(a=>`<option value="${a.id}">${a.nombre} ${a.apellido}</option>`).join('');
  });
  // Deals para actividad
  const dealSel = document.getElementById('a-deal');
  if(dealSel){
    const sorted = [...DB.deals].filter(d=>d.stage!=='LOST').sort((a,b)=>(a.empresas?.nombre||'').localeCompare(b.empresas?.nombre||''));
    dealSel.innerHTML = '<option value="">Sin deal asociado</option>' +
      sorted.map(d=>`<option value="${d.id}">${d.empresas?.nombre||'—'} · ${SLABELS[d.stage]||d.stage}</option>`).join('');
  }
  // Deals WON para facturación
  const factDeal = document.getElementById('fact-deal');
  if(factDeal){
    const won = DB.deals.filter(d=>d.stage==='WON').sort((a,b)=>(a.empresas?.nombre||'').localeCompare(b.empresas?.nombre||''));
    factDeal.innerHTML = won.map(d=>`<option value="${d.id}">${d.empresas?.nombre||'—'} · ${d.agentes?.nombre||''}</option>`).join('');
  }
  // Mes actual por default
  const factMes = document.getElementById('fact-mes');
  if(factMes && !factMes.value){
    const now = new Date();
    factMes.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  }
}

function filtered(){
  const q=(document.getElementById('search')||{value:''}).value.toLowerCase();
  const sf=(document.getElementById('stage-filter')||{value:''}).value;
  return DB.deals.filter(d=>{
    if(curAgent==='diego'   && d.agente_id!=='a1000000-0000-0000-0000-000000000001') return false;
    if(curAgent==='mauricio'&& d.agente_id!=='a1000000-0000-0000-0000-000000000002') return false;
    if(sf && d.stage!==sf) return false;
    if(q){
      const n=(d.empresas?.nombre||'').toLowerCase();
      const c=(d.empresas?.contacto||'').toLowerCase();
      const i=(d.empresas?.industria||'').toLowerCase();
      if(!n.includes(q)&&!c.includes(q)&&!i.includes(q)) return false;
    }
    return true;
  });
}

function agentColor(id){ return id==='a1000000-0000-0000-0000-000000000001'?'#0066FF':'#1D9E75'; }
function agentInitials(id){ return id==='a1000000-0000-0000-0000-000000000001'?'DV':'MB'; }
function agentClass(id){ return id==='a1000000-0000-0000-0000-000000000001'?'av-d':'av-m'; }

/* ── VIEWS ── */
function go(v,el){
  document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));

function render(){

/* DASHBOARD */

  const dealsRojos = dealsBase.filter(d=>{

      ${dealsRojos.map(d=>{
        const dias=diasEnStage(d);

        const agColor=agentColor(d.agente_id);
        return`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #F5C6C6">
          <span style="width:7px;height:7px;border-radius:50%;background:${agColor};flex-shrink:0;display:inline-block"></span>
          <span style="font-weight:600;flex:1;font-size:12px">${d.empresas?.nombre||'—'}</span>
          <span class="badge ${SBADGE[d.stage]}">${SLABELS[d.stage]}</span>

          <button class="btn btn-sm" style="font-size:10px;padding:3px 8px" onclick="closeModal('detail-modal');openDealDetail('${d.id}')">Ver</button>
        </div>`;
      }).join('')}
    </div>` : '';

  const stageCounts={};STAGES.forEach(s=>stageCounts[s]=deals.filter(d=>d.stage===s).length);
  const stageRows=STAGES.filter(s=>s!=='LOST').map(s=>{
    const cnt=stageCounts[s]||0; const pct=deals.length?Math.round(cnt/deals.length*100):0;
    return`<div class="kpi-row"><span style="color:${SCOLORS[s]};font-weight:600;min-width:90px">${SLABELS[s]}</span><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${SCOLORS[s]}"></div></div><span style="min-width:28px;text-align:right;color:var(--text-2)">${cnt}</span></div>`;

  const tasksPending=DB.tareas.filter(t=>!t.completada).slice(0,5);
  const tasksHTML=tasksPending.length?tasksPending.map((t,i)=>`
    <div class="task-row">
      <div class="chk${t.completada?' done':''}" onclick="toggleTask('${t.id}',${!t.completada})">${t.completada?'✓':''}</div>
      <div style="flex:1"><div class="task-txt">${t.titulo}</div><div style="font-size:10px;color:var(--text-3)">${t.agentes?.nombre||''}</div></div>

    </div>`).join(''):`<div class="empty">Sin tareas pendientes</div>`;

  const actsHTML=DB.actividades.slice(0,5).map(a=>`

  document.getElementById('content').innerHTML=`

      <div class="sc"><div class="sc-l">Weighted value</div><div class="sc-v">${fmt(Math.round(wv))}</div><div class="sc-s">por probabilidad</div></div>

/* PIPELINE */
function renderPipeline(deals){
  const byS={};STAGES.forEach(s=>byS[s]=[]);
  deals.forEach(d=>{if(byS[d.stage])byS[d.stage].push(d);});
  const tv=deals.reduce((a,d)=>a+(+d.valor||0),0);
  const wv=deals.reduce((a,d)=>a+(+d.valor||0)*(d.probabilidad||0)/100,0);
  const won=deals.filter(d=>d.stage==='WON').length;
  const active=deals.filter(d=>['Proposal','Negotiation','Verbal Commit'].includes(d.stage)).length;
  const conv=deals.length?Math.round(won/deals.length*100):0;

  let cols=STAGES.map(s=>`
    <div class="pcol">
      <div class="pcol-h" style="color:${SCOLORS[s]}">${SLABELS[s]}<span class="pcnt">${byS[s].length}</span></div>
      ${byS[s].map(d=>`
        <div class="deal-card" onclick="openDealDetail('${d.id}')">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
            <span class="ag-dot" style="background:${agentColor(d.agente_id)}"></span>
            <div class="deal-n">${d.empresas?.nombre||'—'}</div>
          </div>
          ${d.valor>0?`<div class="deal-v">${fmt(d.valor)}${d.probabilidad?' · '+d.probabilidad+'%':''}</div>`:''}
          <div class="deal-c">${d.empresas?.contacto||''}</div>
          ${d.siguiente_paso?`<div class="deal-c" style="color:var(--text-2)">${d.siguiente_paso.substring(0,40)}</div>`:''}
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:5px">
            <span class="badge ${SBADGE[d.stage]}">${SLABELS[d.stage]}</span>
            ${stageDaysLabel(d)}
          </div>
        </div>`).join('')}
    </div>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="stats">
      <div class="sc"><div class="sc-l">Pipeline total</div><div class="sc-v" style="color:var(--purple)">${fmt(tv)}</div><div class="sc-s">${deals.length} empresas</div></div>
      <div class="sc"><div class="sc-l">Weighted value</div><div class="sc-v">${fmt(Math.round(wv))}</div><div class="sc-s">por probabilidad</div></div>
      <div class="sc"><div class="sc-l">Cerrados</div><div class="sc-v" style="color:var(--teal)">${won}</div><div class="sc-s">deals WON</div></div>
      <div class="sc"><div class="sc-l">En cierre</div><div class="sc-v" style="color:var(--amber)">${active}</div><div class="sc-s">activos</div></div>
      <div class="sc"><div class="sc-l">Conversión</div><div class="sc-v">${conv}%</div><div class="sc-s">WON / total</div></div>
    </div>
    <div class="pipeline">${cols}</div>
    <div style="display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--text-3);align-items:center">
      <span style="width:7px;height:7px;border-radius:50%;background:#0066FF;display:inline-block"></span>Diego V.
      <span style="width:7px;height:7px;border-radius:50%;background:#1D9E75;display:inline-block;margin-left:6px"></span>Mauricio B.
    </div>`;
}

function renderContacts(deals){

    <tr>
      <td><div class="av ${agentClass(d.agente_id)}">${agentInitials(d.agente_id)}</div></td>
      <td style="font-weight:600;cursor:pointer" onclick="openDealDetail('${d.id}')">${d.empresas?.nombre||'—'}</td>
      <td>${d.empresas?.contacto||'—'}</td>
      <td style="color:var(--text-2)">${d.empresas?.industria||'—'}</td>
      <td style="color:var(--text-2)">${d.servicio||'—'}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-2)">${d.siguiente_paso||'—'}</td>
      <td><span class="badge ${SBADGE[d.stage]}">${SLABELS[d.stage]}</span></td>

      <td><button class="btn btn-sm" onclick="openEditDeal('${d.id}')">Editar</button></td>

  document.getElementById('content').innerHTML=`
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th></th><th>Empresa</th><th>Contacto</th><th>Industria</th><th>Servicio</th><th>Siguiente paso</th><th>Stage</th><th>Cierre est.</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan="9"><div class="empty">Sin resultados</div></td></tr>'}</tbody>
    </table></div>`;
}

/* TASKS */
function renderTasks(){
  const tasks=curAgent==='all'?DB.tareas:DB.tareas.filter(t=>{
    if(curAgent==='diego')    return t.agente_id==='a1000000-0000-0000-0000-000000000001';
    if(curAgent==='mauricio') return t.agente_id==='a1000000-0000-0000-0000-000000000002';
    return true;
  });
  const rows=tasks.map(t=>`
    <div class="task-row">
      <div class="chk${t.completada?' done':''}" onclick="toggleTask('${t.id}',${!t.completada})">${t.completada?'✓':''}</div>
      <div style="flex:1">
        <div class="task-txt${t.completada?' done':''}">${t.titulo}</div>

/* ANALYTICS */
function renderAnalytics(deals){
  const mDeals=DB.deals.filter(d=>d.agente_id==='a1000000-0000-0000-0000-000000000002');
  const dDeals=DB.deals.filter(d=>d.agente_id==='a1000000-0000-0000-0000-000000000001');
  function agentCard(name,ds,color,cls){
    const tv=ds.reduce((a,d)=>a+(+d.valor||0),0);
    const wv=ds.reduce((a,d)=>a+(+d.valor||0)*(d.probabilidad||0)/100,0);
    const won=ds.filter(d=>d.stage==='WON');
    const wonV=won.reduce((a,d)=>a+(+d.valor||0),0);
    return`<div class="card">
      <div class="card-hdr"><div style="display:flex;align-items:center;gap:8px"><div class="av ${cls}">${cls==='av-m'?'MB':'DV'}</div><div class="card-title">${name}</div></div></div>
      <div class="kpi-row"><span>Empresas</span><span style="font-weight:600">${ds.length}</span></div>
      <div class="kpi-row"><span>Pipeline con valor</span><span style="font-weight:600;color:${color}">${fmt(tv)}</span></div>
      <div class="kpi-row"><span>Weighted value</span><span style="font-weight:600">${fmt(Math.round(wv))}</span></div>
      <div class="kpi-row"><span>Deals WON</span><span style="font-weight:600;color:var(--teal)">${won.length} · ${fmt(wonV)}</span></div>
      <div class="kpi-row"><span>En negociación</span><span style="font-weight:600">${ds.filter(d=>['Negotiation','Verbal Commit'].includes(d.stage)).length}</span></div>
      <div class="kpi-row"><span>Propuestas abiertas</span><span style="font-weight:600">${ds.filter(d=>d.stage==='Proposal').length}</span></div>
    </div>`;
  }
  const byInd={};
  deals.forEach(d=>{if(d.empresas?.industria){byInd[d.empresas.industria]=(byInd[d.empresas.industria]||0)+1;}});
  const topInd=Object.entries(byInd).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const indRows=topInd.map(([ind,cnt])=>{
    const pct=Math.round(cnt/deals.length*100);
    return`<div class="kpi-row"><span>${ind}</span><div class="prog-bar" style="flex:1;margin:0 10px"><div class="prog-fill" style="width:${pct}%;background:var(--purple)"></div></div><span style="color:var(--text-2)">${cnt}</span></div>`;
  }).join('');
  // Historial de facturación
  const factRows = DB.facturacion.length ? DB.facturacion.map(f=>`
    <div class="kpi-row">
      <span style="width:7px;height:7px;border-radius:50%;background:${agentColor(f.agente_id)};display:inline-block;flex-shrink:0"></span>
      <span style="font-weight:500;flex:1;margin-left:8px">${f.deals?.empresas?.nombre||'—'}</span>
      <span style="font-size:11px;color:var(--text-3)">${new Date(f.mes+'T12:00:00').toLocaleDateString('es-MX',{month:'short',year:'numeric'})}</span>
      <span style="font-weight:700;color:var(--teal);margin-left:12px">${fmt(f.monto)}</span>
      <button class="btn btn-sm btn-danger" style="margin-left:8px;padding:2px 8px" onclick="eliminarFacturacion('${f.id}')">×</button>
    </div>`).join('') : '<div class="empty">Sin registros de facturación aún.</div>';

  document.getElementById('content').innerHTML=`
    <div class="two-col" style="margin-bottom:12px">
      ${agentCard('Mauricio Bernaldez',mDeals,'var(--teal)','av-m')}
      ${agentCard('Diego Villanueva',dDeals,'var(--blue)','av-d')}
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-hdr"><div class="card-title">💰 Meta mensual — ${new Date().toLocaleDateString('es-MX',{month:'long',year:'numeric'})}</div><button class="btn btn-sm btn-p" onclick="openFactModal()">+ Registrar</button></div>
      ${metaBarHTML('a1000000-0000-0000-0000-000000000001','Diego Villanueva','#0066FF')}
      ${metaBarHTML('a1000000-0000-0000-0000-000000000002','Mauricio Bernaldez','#1D9E75')}
    </div>
    <div class="card" style="margin-bottom:12px"><div class="card-hdr"><div class="card-title">Top industrias</div></div>${indRows||'<div class="empty">Sin datos</div>'}</div>
    <div class="card"><div class="card-hdr"><div class="card-title">Historial de facturación</div></div>${factRows}</div>`;
}

async function saveDeal(){
  const empresa=document.getElementById('f-empresa').value.trim(); if(!empresa){toast('Ingresa el nombre de la empresa',false);return;}
  const contacto=document.getElementById('f-contacto').value.trim();
  const industria=document.getElementById('f-industria').value.trim();
  const servicio=document.getElementById('f-servicio').value.trim();
  const stage=document.getElementById('f-stage').value;
  const agente_id=document.getElementById('f-agente').value;
  const valor=parseFloat(document.getElementById('f-valor').value)||0;
  const probabilidad=parseInt(document.getElementById('f-prob').value)||0;
  const siguiente_paso=document.getElementById('f-siguiente').value.trim();
  const fecha_primer_contacto=document.getElementById('f-fecha1').value||null;
  const fecha_cierre_estimada=document.getElementById('f-fecha2').value||null;
  try {
    if(editingDealId){
      const d=DB.deals.find(x=>x.id===editingDealId);
      await sb.from('empresas').update({nombre:empresa,contacto,industria}).eq('id',d.empresa_id);
      const stageChanged = d.stage !== stage;
      const updatePayload = {servicio,stage,agente_id,valor,probabilidad,siguiente_paso,fecha_primer_contacto,fecha_cierre_estimada};
      if(stageChanged) updatePayload.stage_since = new Date().toISOString();
      await sb.from('deals').update(updatePayload).eq('id',editingDealId);
      // Registrar cambio de stage en historial
      if(stageChanged){
        await sb.from('stage_history').insert({
          deal_id: editingDealId,
          stage_anterior: d.stage,
          stage_nuevo: stage,
          agente_id
        });
      }
      toast('Deal actualizado');
    } else {
      const {data:emp}=await sb.from('empresas').insert({nombre:empresa,contacto,industria}).select().single();
      const {data:newDeal}=await sb.from('deals').insert({empresa_id:emp.id,agente_id,servicio,stage,valor,probabilidad,siguiente_paso,fecha_primer_contacto,fecha_cierre_estimada,stage_since:new Date().toISOString()}).select().single();
      // Registrar stage inicial
      if(newDeal) await sb.from('stage_history').insert({ deal_id:newDeal.id, stage_anterior:null, stage_nuevo:stage, agente_id });
      toast('Deal creado');
    }
    closeModal('deal-modal'); await loadData();
  } catch(e){ toast('Error: '+e.message,false); }
}

async function generarResumen(){
  const activos = DB.deals.filter(d=>!['WON','LOST'].includes(d.stage));
  const won = DB.deals.filter(d=>d.stage==='WON');
  const lost = DB.deals.filter(d=>d.stage==='LOST');
  const rojos = activos.filter(d=>{ const dias=diasEnStage(d); return dias!==null && dias>=(STAGE_LIMITS[d.stage]||14); });
  const tvTotal = DB.deals.reduce((a,d)=>a+(+d.valor||0),0);
  const tvWon = won.reduce((a,d)=>a+(+d.valor||0),0);

  const lineas = activos
    .sort((a,b)=>diasEnStage(b)-diasEnStage(a))
    .map(d=>{
      const dias = diasEnStage(d)||0;
      const alerta = dias>=(STAGE_LIMITS[d.stage]||14) ? '🔴' : '🟢';
      return `${alerta} ${d.empresas?.nombre||''} | ${d.stage} | ${dias} días | ${d.valor>0?'$'+Number(d.valor).toLocaleString():'sin valor'} | ${d.probabilidad||0}% | ${d.agentes?.nombre||''} | Sig: ${d.siguiente_paso||'—'}`;
    }).join('\n');

  const mensaje =
`Soy Gabriel Garza, Director de Nuevos Negocios en Tendencys Innovations (LogisticTech México). Aquí están los datos en vivo de mi pipeline de ventas. Necesito un resumen ejecutivo con: estado general, deals que necesitan acción inmediata, oportunidades más cercanas al cierre, y UNA recomendación concreta para esta semana. Sé directo, usa nombres reales.

📊 PIPELINE — ${new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})}
- Deals activos: ${activos.length} | WON: ${won.length} ($${tvWon.toLocaleString()}) | LOST: ${lost.length}
- Pipeline total: $${tvTotal.toLocaleString()}
- En alerta roja: ${rojos.length} deals

DEALS ACTIVOS (ordenados por días en stage):
${lineas}`;

  const url = 'https://claude.ai/new?q=' + encodeURIComponent(mensaje);
  window.open(url, '_blank');
}

/* ── FACTURACIÓN ── */
const META_MENSUAL = 500000;

function openFactModal(){ document.getElementById('fact-modal').classList.add('open'); }

async function saveFacturacion(){
  const deal_id = document.getElementById('fact-deal').value; if(!deal_id){toast('Selecciona un cliente',false);return;}
  const monto = parseFloat(document.getElementById('fact-monto').value)||0; if(!monto){toast('Ingresa el monto',false);return;}
  const mes = document.getElementById('fact-mes').value; if(!mes){toast('Selecciona el mes',false);return;}
  const agente_id = document.getElementById('fact-agente').value;
  const notas = document.getElementById('fact-notas').value.trim();
  try {
    await sb.from('facturacion').insert({ deal_id, agente_id, monto, mes: mes+'-01', notas });
    toast('Facturación registrada');
    closeModal('fact-modal');
    await loadData();
  } catch(e){ toast('Error: '+e.message, false); }
}

function facturacionMesActual(agente_id=null){
  const now = new Date();
  const mesStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  return DB.facturacion.filter(f=>{
    const fMes = f.mes?.substring(0,7);
    if(fMes !== mesStr) return false;
    if(agente_id && f.agente_id !== agente_id) return false;
    return true;
  }).reduce((a,f)=>a+(+f.monto||0), 0);
}

async function deleteFacturacion(id){
  if(!confirm('¿Eliminar este registro?')) return;
  await sb.from('facturacion').delete().eq('id',id);
  toast('Registro eliminado'); await loadData();
}

function metaBarHTML(agente_id, nombre, color){
  const facturado = facturacionMesActual(agente_id);
  const pct = Math.min(Math.round(facturado/META_MENSUAL*100), 100);
  const faltante = Math.max(META_MENSUAL - facturado, 0);
  const statusColor = pct>=100 ? 'var(--teal)' : pct>=60 ? 'var(--amber)' : 'var(--red)';
  return `<div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span style="font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block"></span>${nombre}
      </span>
      <span style="font-size:12px;font-weight:700;color:${statusColor}">${fmt(facturado)} <span style="font-weight:400;color:var(--text-3)">/ $500K</span></span>
    </div>
    <div style="height:8px;background:var(--bg);border-radius:999px;overflow:hidden;border:1px solid var(--border)">
      <div style="height:100%;width:${pct}%;background:${statusColor};border-radius:999px;transition:width .4s"></div>
    </div>
    <div style="font-size:10px;color:var(--text-3);margin-top:3px;text-align:right">${pct}% · ${faltante>0?'Falta '+fmt(faltante):'✓ Meta alcanzada'}</div>
  </div>`;
}

async function eliminarFacturacion(id){ await deleteFacturacion(id); }

function exportarExcel(){
  const deals = filtered();
  if(!deals.length){ toast('No hay deals para exportar',false); return; }

  // Hoja 1 — Pipeline completo
  const headers1 = ['Empresa','Contacto','Industria','Servicio','Stage','Agente','Valor','Probabilidad %','Weighted Value','Días en Stage','Siguiente Paso','Primer Contacto','Cierre Estimado'];
  const rows1 = deals.map(d=>[
    d.empresas?.nombre||'',
    d.empresas?.contacto||'',
    d.empresas?.industria||'',
    d.servicio||'',
    SLABELS[d.stage]||d.stage,
    (d.agentes?.nombre||'')+' '+(d.agentes?.apellido||''),
    d.valor||0,
    d.probabilidad||0,
    Math.round((+d.valor||0)*(d.probabilidad||0)/100),
    diasEnStage(d)||0,
    d.siguiente_paso||'',
    d.fecha_primer_contacto||'',
    d.fecha_cierre_estimada||''
  ]);

  // Hoja 2 — Facturación
  const headers2 = ['Empresa','Agente','Mes','Monto','Notas'];
  const rows2 = DB.facturacion.map(f=>[
    f.deals?.empresas?.nombre||'',
    (f.agentes?.nombre||'')+' '+(f.agentes?.apellido||''),
    f.mes?.substring(0,7)||'',
    f.monto||0,
    f.notas||''
  ]);

  // Construir XML de Excel (formato SpreadsheetML)
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const cell = (v,i) => {
    if(typeof v === 'number') return `<Cell><Data ss:Type="Number">${v}</Data></Cell>`;
    return `<Cell><Data ss:Type="String">${esc(v)}</Data></Cell>`;
  };
  const makeSheet = (name, headers, rows) => `
  <Worksheet ss:Name="${esc(name)}">
    <Table>
      <Row>${headers.map(h=>`<Cell ss:StyleID="h"><Data ss:Type="String">${esc(h)}</Data></Cell>`).join('')}</Row>
      ${rows.map(r=>`<Row>${r.map(cell).join('')}</Row>`).join('')}
    </Table>
  </Worksheet>`;

  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
  <Styles>
    <Style ss:ID="h"><Font ss:Bold="1"/><Interior ss:Color="#0066FF" ss:Pattern="Solid"/><Font ss:Color="#FFFFFF" ss:Bold="1"/></Style>
  </Styles>
  ${makeSheet('Pipeline', headers1, rows1)}
  ${makeSheet('Facturación', headers2, rows2)}
</Workbook>`;

  const blob = new Blob([xml], {type:'application/vnd.ms-excel;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fecha = new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
  a.href = url;
  a.download = `CRM_Pipeline_${fecha}.xls`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Excel descargado');
}

function closeModal(id){ const el=document.getElementById(id); if(el){el.classList.remove('open');if(id==='detail-modal')el.remove();} }

function goMobile(v, el){
  document.querySelectorAll('.mobile-nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  curView=v;
  const titles={dashboard:'Dashboard',pipeline:'Pipeline',contacts:'Contactos',tasks:'Tareas',activities:'Actividades',analytics:'Analytics'};
  document.getElementById('tb-title').textContent=titles[v];
  render();
}

loadData();
